name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # Lint, type-check and test inside the dev image (docker-first: no host toolchain).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          load: true
          tags: energy-optimizer:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Lint (ruff)
        run: docker run --rm energy-optimizer:dev ruff check src tests
      - name: Type-check (mypy)
        run: docker run --rm energy-optimizer:dev mypy src
        continue-on-error: true
      - name: Test (pytest)
        run: docker run --rm energy-optimizer:dev pytest -q

  # Verify the production image builds (push happens only on tag via docker-publish.yml).
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64
          push: false
          tags: energy-optimizer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

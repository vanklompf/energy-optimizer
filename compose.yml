# Production-style run (dry_run). This is the primary way to run the app.
#
#   cp .env.example .env      # then fill in secrets
#   docker compose up -d --build
#
# The image can also be pulled from GHCR instead of built locally by setting
# EO_IMAGE and removing the `build:` block (this is what the ansible-nas role does).

services:
  energy-optimizer:
    build:
      context: .
      target: runtime
    image: ${EO_IMAGE:-energy-optimizer:latest}
    container_name: energy-optimizer
    env_file:
      - path: .env
        required: false
    environment:
      EO_MODE: dry_run
      EO_DB: /data/energy_optimizer.sqlite
      EO_HTTP_HOST: 0.0.0.0
      EO_HTTP_PORT: "8320"
      TZ: Europe/Warsaw
    ports:
      - "${EO_PORT:-8320}:8320"
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8320/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
